# ============================ Index ============================

Index:
  - Project
  - Objectives
  - Git-Flow
  - Npm_Scripts

# ============================ Project ============================

Project:
  name: JsonLens
  role: frontend
  repository: https://github.com/LinoELa/JsonLens.git
  stack:
    - React
    - Vite
    - JavaScript

  description: >
    JsonLens es el frontend del proyecto.
    Su funcion es permitir al usuario cargar, pegar, validar,
    formatear, visualizar y comparar documentos JSON mediante
    una interfaz clara, rapida y moderna.

  next_setup_targets:
    - Definir la estructura base del frontend.
    - Crear componentes, pages, services, utils y styles.
    - Configurar el puerto de desarrollo.
    - Preparar la integracion con el backend adminJsonLens.

# ============================ Objectives ============================

Objectives:
  - Construir una interfaz web para trabajar con documentos JSON.
  - Permitir pegar o cargar archivos JSON.
  - Validar si el JSON es correcto.
  - Formatear JSON para mejorar su lectura.
  - Visualizar la estructura del JSON de forma clara.
  - Comparar dos documentos JSON.
  - Mostrar diferencias estructurales entre JSON.
  - Enviar datos al backend y mostrar los resultados procesados.

# ============================ Git Flow ============================

Git-Flow:
  applies_to: Cada repositorio por separado.

  git:
    description: Los comandos Git se ejecutan dentro de cada repositorio, no en la raiz.

  branches:
    main:
      role: produccion
      rules:
        - Solo contiene codigo estable.
        - No se trabaja directamente aqui.
        - Recibe cambios desde dev o hotfix/*.

    dev:
      role: integracion
      rules:
        - Todas las features nacen desde dev.
        - Los bugfix nacen desde dev.
        - Cuando dev esta estable se fusiona hacia main.

    feature:
      info: "feature = fase del proyecto"
      pattern: feature/${NAME}
      source: dev
      target: dev
      examples:
        - feature-1/1
        - feature-1/2
        - feature-1/3
        - feature-2/1
        - feature-2/2
        - feature-2/3
        - feature-3/1
        - feature-3/2
        - feature-3/3

    bugfix:
      pattern: bugfix/${NAME}
      source: dev
      target: dev
      examples:
        - bugfix/json-parse-error
        - bugfix/editor-crash

    hotfix:
      pattern: hotfix/${NAME}
      source: main
      targets:
        - main
        - dev
      examples:
        - hotfix/security-error
        - hotfix/ui-crash

  commit_convention:
    format: "type: descripcion corta"
    types:
      - feat
      - fix
      - docs
      - refactor
      - chore
      - test

  commands:
    list_branches:
      description: Listar ramas y limpiar referencias remotas.
      steps:
        - git fetch --all --prune
        - git branch -a
        - git log --oneline --graph --decorate --all

    create_feature:
      description: Crear una feature desde dev.
      steps:
        - git checkout dev
        - git pull origin dev
        - git checkout -b feature/${NAME}
        - git push -u origin feature/${NAME}

    create_bugfix:
      description: Crear un bugfix desde dev.
      steps:
        - git checkout dev
        - git pull origin dev
        - git checkout -b bugfix/${NAME}
        - git push -u origin bugfix/${NAME}

    create_hotfix:
      description: Crear un hotfix desde main.
      steps:
        - git checkout main
        - git pull origin main
        - git checkout -b hotfix/${NAME}
        - git push -u origin hotfix/${NAME}

    merge_feature_into_dev:
      description: Fusionar una feature en dev.
      steps:
        - git checkout dev
        - git pull origin dev
        - git merge feature/${NAME}
        - git push origin dev

    merge_bugfix_into_dev:
      description: Fusionar un bugfix en dev.
      steps:
        - git checkout dev
        - git pull origin dev
        - git merge bugfix/${NAME}
        - git push origin dev

    merge_dev_into_main:
      description: Publicar a produccion desde dev.
      steps:
        - git checkout main
        - git pull origin main
        - git merge dev
        - git push origin main

    merge_hotfix:
      description: Aplicar un hotfix tanto en main como en dev.
      steps:
        - git checkout main
        - git pull origin main
        - git merge hotfix/${NAME}
        - git push origin main
        - git checkout dev
        - git pull origin dev
        - git merge hotfix/${NAME}
        - git push origin dev

    publish_current_branch:
      description: Publicar la rama actual y definir upstream.
      steps:
        - git push -u origin HEAD

    restore_stash:
      description: Recuperar el ultimo stash.
      steps:
        - git stash list
        - git stash show -p
        - git stash pop

    sync_without_merge:
      description: Sincronizar referencias sin hacer merge.
      steps:
        - git fetch --all --prune

    preview_diff_main_vs_dev:
      description: Ver cambios pendientes entre main y dev.
      steps:
        - git log --oneline --graph dev..main

# ============================ NPM Scripts ============================

Npm_Scripts:
  development:
    dev: vite # Inicia el servidor de desarrollo del frontend
    start: vite # Alias de dev para mantener una convencion simple
    preview: vite preview # Previsualiza la build generada en local

  build:
    build: vite build # Compila la aplicacion para produccion
    serve: vite preview # Sirve la build compilada en entorno local
    clean: rimraf dist # Limpia la carpeta dist antes de una nueva build

  testing:
    test: vitest # Ejecuta los tests unitarios
    test_watch: vitest --watch # Ejecuta tests en modo vigilancia
    test_coverage: vitest run --coverage # Genera reporte de cobertura
    test_e2e: playwright test # Ejecuta tests end to end si se usa Playwright

  quality:
    lint: eslint . --ext .js,.jsx # Analiza el codigo del frontend
    lint_fix: eslint . --fix # Corrige automaticamente errores simples
    format: prettier --write . # Formatea el codigo del proyecto

  dependencies:
    deps_audit: npm audit # Revisa vulnerabilidades en dependencias
    deps_update: npm-check -u # Actualiza dependencias interactivamente
    deps_outdated: npm outdated # Lista dependencias desactualizadas

  docs_and_analysis:
    analyze: source-map-explorer dist/*.js # Analiza el tamaño del bundle generado
    env: node -p "process.env" # Muestra variables de entorno disponibles

  deploy:
    deploy: gh-pages -d dist # Publica la aplicacion en GitHub Pages
    vercel: vercel --prod # Despliega la aplicacion en Vercel
    netlify: netlify deploy --prod # Despliega la aplicacion en Netlify

  maintenance:
    check: npm run lint && npm test # Ejecuta comprobaciones basicas antes de subir cambios
    prepare: husky install # Inicializa Husky para hooks de Git